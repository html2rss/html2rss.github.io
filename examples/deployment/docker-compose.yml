services:
  html2rss-web:
    image: html2rss/web:1
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    env_file:
      - path: .env
        required: false
    environment:
      PORT: 4000
      RACK_ENV: production
      HTML2RSS_SECRET_KEY: ${HTML2RSS_SECRET_KEY}
      HTML2RSS_ACCESS_TOKEN: ${HTML2RSS_ACCESS_TOKEN}
      AUTO_SOURCE_ENABLED: ${AUTO_SOURCE_ENABLED}
